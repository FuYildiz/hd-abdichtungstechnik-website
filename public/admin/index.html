<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · HD Abdichtungstechnik</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="../favicon.png" type="image/png">
  <style>
    :root {
      --black: #0a0a0a; --gray-900: #171717; --gray-600: #555; --gray-400: #999;
      --gray-200: #e5e5e5; --gray-100: #f5f5f5; --white: #fff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--black); background: var(--white); padding: 32px;
      font-size: 14px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .sub { color: var(--gray-400); margin-bottom: 24px; font-size: 0.85rem; }
    .filters { display: flex; gap: 12px; margin-bottom: 20px; }
    select, button {
      font-family: inherit; font-size: 0.85rem; padding: 8px 12px;
      border: 1px solid var(--gray-200); border-radius: 3px; background: var(--white);
    }
    table { width: 100%; border-collapse: collapse; }
    th, td {
      text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--gray-200);
      vertical-align: top;
    }
    th { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--gray-400); }
    td.message { max-width: 320px; white-space: pre-wrap; color: var(--gray-600); }
    .badge {
      display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 0.75rem;
      background: var(--gray-100); border: 1px solid var(--gray-200);
    }
    .empty { color: var(--gray-400); padding: 40px 0; text-align: center; }
    a.mailto { color: var(--black); text-decoration: underline; }
  </style>
</head>
<body>
  <h1>HD Abdichtungstechnik — Anfragen</h1>
  <p class="sub">Formular-Einsendungen von der Website.</p>

  <div class="filters">
    <select id="filter-category">
      <option value="">Alle Kategorien</option>
      <option value="Flachdach">Flachdach</option>
      <option value="Balkon">Balkon</option>
      <option value="Garage">Garage</option>
      <option value="Terrasse">Terrasse</option>
      <option value="Sockel">Sockel</option>
      <option value="Sonstiges">Sonstiges</option>
    </select>
    <select id="filter-status">
      <option value="">Alle Status</option>
      <option value="neu">Neu</option>
      <option value="kontaktiert">Kontaktiert</option>
      <option value="angebot">Angebot</option>
      <option value="auftrag">Auftrag</option>
      <option value="abgelehnt">Abgelehnt</option>
    </select>
    <button id="refresh">Aktualisieren</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Datum</th>
        <th>Name</th>
        <th>Kontakt</th>
        <th>Kategorie</th>
        <th>Nachricht</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="leads-body"></tbody>
  </table>
  <p id="empty-state" class="empty" hidden>Keine Anfragen gefunden.</p>

  <script src="admin.js"></script>
</body>
</html>
